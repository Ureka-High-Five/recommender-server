version: "3.8"

services:
  api:
    network_mode: host
    image: ghkdwldus0807/lead-me-recommend:latest
    container_name: recommender_server
    restart: unless-stopped
    env_file:
      - .env

    volumes:
      - ./app/models:/code/app/models
      - ./logs:/code/logs

    ports:
      - "8000:8000"

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - ./logs:/code/logs:ro
      - ./promtail-config.yml:/code/promtail-config.yml
    command: -config.file=/code/promtail-config.yml -config.expand-env=true
    environment:
      LOKI_SERVER_IP: ${LOKI_SERVER_IP}
    depends_on:
      - api
