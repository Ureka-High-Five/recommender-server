name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: set up .env.local
        run: |
          echo "DB_HOST=localhost" >> .env.local
          echo "DB_PORT=5432" >> .env.local
          echo "DB_USERNAME=testuser" >> .env.local
          echo "DB_PASSWORD=testpass" >> .env.local
          echo "DB_NAME=testdb" >> .env.local
          echo "W2V_MODEL_PATH=./app/assets/word2vec.model" >> .env.local
          echo "MONGO_URL=mongodb://localhost:27017" >> .env.local
          echo "RABBITMQ_URL=localhost" >> .env.local
          echo "RABBITMQ_PORT=5672" >> .env.local
          echo "DEV_REDIS_HOST=localhost" >> .env.local
          echo "DEV_REDIS_PORT=6379" >> .env.local
          echo "REDIS_DEFAULT

      - name: Lint (ruff) & Unit-test (pytest)
        run: |
          pip install ruff pytest
          ruff check .
          pytest -q || [ $? -eq 5 ]
        
